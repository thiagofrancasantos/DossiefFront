<app-navbar></app-navbar>

<div style="min-height: 100vh; background: #f4f6f9; padding: 30px 15px;">

     <!-- ERROR -->
     <div *ngIf="errorMessage" style="
               max-width: 1000px;
               margin: 0 auto 20px auto;
               background: #ffe5e5;
               border: 1px solid #ffb3b3;
               color: #cc0000;
               padding: 12px 16px;
               border-radius: 10px;
               font-weight: 500;">

          {{ errorMessage }}

     </div>
     <!-- SUCCESS -->
     <div *ngIf="successMessage" style="
          max-width: 1000px;
          margin: 0 auto 20px auto;
          background: #e8fff1;
          border: 1px solid #9ee6b8;
          color: #18794e;
          padding: 12px 16px;
          border-radius: 10px;
          font-weight: 500;
          box-shadow: 0 2px 8px rgba(24,121,78,0.08);">

          {{ successMessage }}

     </div>

     <!-- CARD -->
     <div style="
               max-width: 1100px;
               margin: auto;
               background: white;
               border-radius: 18px;
               box-shadow: 0 4px 20px rgba(0,0,0,0.08);
               overflow: hidden;">

          <!-- HEADER -->
          <div style="
                    background: linear-gradient(135deg, #005bea, #00c6fb);
                    padding: 28px;">

               <h2 style="
                         margin: 0;
                         color: white;
                         font-size: 32px;
                         font-weight: bold;">

                    Novo Funcionário

               </h2>

               <p style="
                         margin-top: 6px;
                         color: rgba(255,255,255,0.9);
                         font-size: 14px;">

                    Cadastro de colaborador e documentos

               </p>

          </div>

          <!-- FORM -->
          <form [formGroup]="funcionarioForm" (ngSubmit)="createFuncionario()" style="padding: 35px;">

               <!-- LINHA -->
               <div style="
                         display: flex;
                         gap: 20px;
                         flex-wrap: wrap;
                         margin-bottom: 25px;">

                    <!-- NOME -->
                    <div style="flex: 1; min-width: 220px;">

                         <label for="nome" style="
                                   display: block;
                                   margin-bottom: 8px;
                                   font-weight: 600;
                                   color: #444;">

                              Nome

                         </label>

                         <input pInputText id="nome" formControlName="nome" style="
                                   width: 100%;
                                   padding: 12px;
                                   border-radius: 10px;
                                   border: 1px solid #d1d5db;
                                   outline: none;" />

                    </div>

                    <!-- MATRICULA -->
                    <div style="flex: 1; min-width: 220px;">

                         <label for="matricula" style="
                                   display: block;
                                   margin-bottom: 8px;
                                   font-weight: 600;
                                   color: #444;">

                              Matrícula

                         </label>

                         <input pInputText id="matricula" formControlName="matricula" style="
                                   width: 100%;
                                   padding: 12px;
                                   border-radius: 10px;
                                   border: 1px solid #d1d5db;
                                   outline: none;" />

                    </div>

               </div>

               <!-- LINHA -->
               <div style="
                         display: flex;
                         gap: 20px;
                         flex-wrap: wrap;
                         margin-bottom: 30px;">

                    <!-- STATUS -->
                    <div style="flex: 1; min-width: 220px;">

                         <label for="status" style="
                                   display: block;
                                   margin-bottom: 8px;
                                   font-weight: 600;
                                   color: #444;">

                              Status

                         </label>

                         <select id="status" formControlName="status" style="
                                   width: 100%;
                                   padding: 12px;
                                   border-radius: 10px;
                                   border: 1px solid #d1d5db;
                                   height: 46px;
                                   background: white;">

                              <option value="Ativo">Ativo</option>
                              <option value="Inativo">Inativo</option>
                              <option value="Suspenso">Suspenso</option>

                         </select>

                    </div>

                    <!-- TELEFONE -->
                    <div style="flex: 1; min-width: 220px;">

                         <label for="telefone" style="
                                   display: block;
                                   margin-bottom: 8px;
                                   font-weight: 600;
                                   color: #444;">

                              Telefone

                         </label>

                         <input pInputText id="telefone" formControlName="telefone" placeholder="(XX) XXXXX-XXXX" style="
                                   width: 100%;
                                   padding: 12px;
                                   border-radius: 10px;
                                   border: 1px solid #d1d5db;
                                   outline: none;" />

                    </div>

               </div>

               <!-- DOCUMENTOS -->
               <div style="margin-top: 10px;">

                    <div style="
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                              margin-bottom: 20px;">

                         <h3 style="
                                   margin: 0;
                                   font-size: 28px;
                                   color: #333;">

                              📂 Documentos

                         </h3>

                         <p-button label="Adicionar Documento" [raised]="true" severity="info" icon="pi pi-plus"
                              (click)="addDocumento()">
                         </p-button>

                    </div>

                    <!-- DOCUMENTOS -->
                    <div formArrayName="documentos">

                         <div *ngFor="let doc of documentos.controls; let i = index" [formGroupName]="i" style="
                                   background: #f9fafb;
                                   border: 1px solid #e5e7eb;
                                   border-radius: 14px;
                                   padding: 20px;
                                   margin-bottom: 18px;">

                              <div style="
                                        display: flex;
                                        gap: 20px;
                                        flex-wrap: wrap;">

                                   <!-- CATEGORIA -->
                                   <div style="flex: 1; min-width: 220px;">

                                        <label [for]="'categoria' + i" style="
                                                  display: block;
                                                  margin-bottom: 8px;
                                                  font-weight: 600;
                                                  color: #444;">

                                             Categoria

                                        </label>

                                        <select [id]="'categoria' + i" formControlName="categoria" style="
                                                  width: 100%;
                                                  padding: 12px;
                                                  border-radius: 10px;
                                                  border: 1px solid #d1d5db;
                                                  background: white;">

                                             <option value="">
                                                  Selecione
                                             </option>

                                             <option value="Treinamento">
                                                  Treinamento
                                             </option>

                                             <option value="Integracao">
                                                  Integração
                                             </option>

                                             <option value="Historico">
                                                  Histórico
                                             </option>

                                        </select>

                                   </div>

                                   <!-- ARQUIVO -->
                                   <div style="flex: 1; min-width: 220px;">

                                        <label [for]="'arquivo' + i" style="
                                                  display: block;
                                                  margin-bottom: 8px;
                                                  font-weight: 600;
                                                  color: #444;">

                                             Arquivo

                                        </label>

                                        <input type="file" [id]="'arquivo' + i" (change)="onFileChange($event, i)"
                                             style="
                                                  width: 100%;
                                                  padding: 10px;
                                                  border-radius: 10px;
                                                  border: 1px solid #d1d5db;
                                                  background: white;" />

                                   </div>

                              </div>

                              <!-- REMOVER -->
                              <div style="
                                        display: flex;
                                        justify-content: flex-end;
                                        margin-top: 20px;">

                                   <p-button type="button" [raised]="true" severity="danger" label="Remover"
                                        icon="pi pi-trash" (click)="removeDocumento(i)">
                                   </p-button>

                              </div>

                         </div>

                    </div>

               </div>

               <!-- BOTÕES -->
               <div style="
                         display: flex;
                         justify-content: flex-end;
                         gap: 15px;
                         margin-top: 40px;">

                    <p-button label="Cancelar" [raised]="true" severity="danger" icon="pi pi-times" (click)="cancel()">
                    </p-button>

                    <p-button label="Cadastrar Funcionário" type="submit" [raised]="true" severity="success"
                         icon="pi pi-check" [disabled]="!funcionarioForm.valid">
                    </p-button>

               </div>

          </form>

     </div>

</div>
