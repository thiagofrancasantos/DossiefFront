<app-navbar></app-navbar>

<div style="
    min-height: 100vh;
    background: #f4f6f9;
    padding: 30px 15px;
  ">

  <!-- ERROR -->
  <div *ngIf="errorMessage" style="
      max-width: 1100px;
      margin: 0 auto 20px auto;
      background: #ffe5e5;
      border: 1px solid #ffb3b3;
      color: #cc0000;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 500;
    ">
    {{ errorMessage }}
  </div>

  <!-- SUCCESS -->
  <div *ngIf="successMessage" style="
    max-width: 1100px;
    margin: 0 auto 20px auto;
    background: #dcfce7;
    border: 1px solid #86efac;
    color: #166534;
    padding: 12px 16px;
    border-radius: 10px;
    font-weight: 500;
  ">
    {{ successMessage }}
  </div>

  <!-- CARD -->
  <div style="
      max-width: 1100px;
      margin: auto;
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    ">

    <!-- HEADER -->
    <div style="
        background: linear-gradient(135deg, #005bea, #00c6fb);
        padding: 28px;
      ">

      <h2 style="
          margin: 0;
          color: white;
          font-size: 32px;
          font-weight: bold;
        ">
        Editar Funcionário
      </h2>

      <p style="
          margin-top: 6px;
          color: rgba(255,255,255,0.9);
          font-size: 14px;
        ">
        Atualização de colaborador e documentos
      </p>

    </div>

    <!-- FORM -->
    <form [formGroup]="funcionarioForm" (ngSubmit)="saveFuncionario()" style="padding: 35px;">

      <!-- LINHA -->
      <div style="
          display: flex;
          gap: 20px;
          flex-wrap: wrap;
          margin-bottom: 25px;
        ">

        <!-- NOME -->
        <div style="flex: 1; min-width: 220px;">

          <label for="nome" style="
              display: block;
              margin-bottom: 8px;
              font-weight: 600;
              color: #444;
            ">
            Nome
          </label>

          <input pInputText id="nome" formControlName="nome" style="
              width: 100%;
              padding: 12px;
              border-radius: 10px;
              border: 1px solid #d1d5db;
              outline: none;
            " />

          <small *ngIf="funcionarioForm.get('nome')?.touched && funcionarioForm.get('nome')?.errors?.['required']"
            style="
              color: red;
              display: block;
              margin-top: 5px;
            ">
            Nome é obrigatório.
          </small>

        </div>

        <!-- MATRICULA -->
        <div style="flex: 1; min-width: 220px;">

          <label for="matricula" style="
              display: block;
              margin-bottom: 8px;
              font-weight: 600;
              color: #444;
            ">
            Matrícula
          </label>

          <input pInputText id="matricula" formControlName="matricula" style="
              width: 100%;
              padding: 12px;
              border-radius: 10px;
              border: 1px solid #d1d5db;
              outline: none;
            " />

          <small
            *ngIf="funcionarioForm.get('matricula')?.touched && funcionarioForm.get('matricula')?.errors?.['required']"
            style="
              color: red;
              display: block;
              margin-top: 5px;
            ">
            Matrícula é obrigatória.
          </small>

        </div>

      </div>

      <!-- LINHA -->
      <div style="
          display: flex;
          gap: 20px;
          flex-wrap: wrap;
          margin-bottom: 30px;
        ">

        <!-- TELEFONE -->
        <div style="flex: 1; min-width: 220px;">

          <label for="telefone" style="
              display: block;
              margin-bottom: 8px;
              font-weight: 600;
              color: #444;
            ">
            Telefone
          </label>

          <input pInputText id="telefone" formControlName="telefone" style="
              width: 100%;
              padding: 12px;
              border-radius: 10px;
              border: 1px solid #d1d5db;
              outline: none;
            " />

          <small
            *ngIf="funcionarioForm.get('telefone')?.touched && funcionarioForm.get('telefone')?.errors?.['required']"
            style="
              color: red;
              display: block;
              margin-top: 5px;
            ">
            Telefone é obrigatório.
          </small>

        </div>

        <!-- STATUS -->
        <div style="flex: 1; min-width: 220px;">

          <label for="status" style="
              display: block;
              margin-bottom: 8px;
              font-weight: 600;
              color: #444;
            ">
            Status
          </label>

          <select id="status" formControlName="status" style="
              width: 100%;
              padding: 12px;
              border-radius: 10px;
              border: 1px solid #d1d5db;
              background: white;
              height: 46px;
            ">

            <option value="" disabled>
              Selecione o Status
            </option>

            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
            <option value="Suspenso">Suspenso</option>

          </select>

          <small *ngIf="funcionarioForm.get('status')?.touched && funcionarioForm.get('status')?.errors?.['required']"
            style="
              color: red;
              display: block;
              margin-top: 5px;
            ">
            Status é obrigatório.
          </small>

        </div>

      </div>

      <!-- EDIT BUTTON -->
      <div style="
          text-align: center;
          margin-bottom: 25px;
        " *ngIf="!editMode">

        <p-button label="Editar Funcionário" icon="pi pi-pencil" (click)="enableEdit()">
        </p-button>

      </div>

      <!-- DOCUMENTOS -->
      <div *ngIf="editMode">

        <div style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
          ">

          <h3 style="
              margin: 0;
              font-size: 28px;
              color: #333;
            ">
            📂 Documentos
          </h3>

          <p-button label="Adicionar Documento" [raised]="true" severity="info" icon="pi pi-plus"
            (click)="addDocumento()">
          </p-button>

        </div>

        <!-- FORM ARRAY -->
        <div formArrayName="documentos">

          <div *ngFor="let doc of documentos.controls; let i = index" [formGroupName]="i" style="
              background: #f9fafb;
              border: 1px solid #e5e7eb;
              border-radius: 14px;
              padding: 20px;
              margin-bottom: 18px;
            ">

            <div style="
                display: flex;
                gap: 20px;
                flex-wrap: wrap;
              ">

              <!-- CATEGORIA -->
              <div style="flex: 1; min-width: 220px;">

                <label [for]="'categoria' + i" style="
                    display: block;
                    margin-bottom: 8px;
                    font-weight: 600;
                    color: #444;
                  ">
                  Categoria
                </label>

                <select [id]="'categoria' + i" formControlName="categoria" style="
                    width: 100%;
                    padding: 12px;
                    border-radius: 10px;
                    border: 1px solid #d1d5db;
                    background: white;
                  ">

                  <option value="" disabled>
                    Selecione uma categoria
                  </option>

                  <option *ngFor="let option of categoriasOptions" [value]="option.value">
                    {{ option.label }}
                  </option>

                </select>

                <small *ngIf="doc.get('categoria')?.touched && doc.get('categoria')?.errors?.['required']" style="
                    color: red;
                    display: block;
                    margin-top: 5px;
                  ">
                  Categoria é obrigatória.
                </small>

              </div>

              <!-- ARQUIVO -->
              <div style="flex: 1; min-width: 220px;">

                <label [for]="'arquivo' + i" style="
                    display: block;
                    margin-bottom: 8px;
                    font-weight: 600;
                    color: #444;
                  ">
                  Arquivo
                </label>

                <input type="file" [id]="'arquivo' + i" (change)="onFileChange($event, i)" style="
                    width: 100%;
                    padding: 10px;
                    border-radius: 10px;
                    border: 1px solid #d1d5db;
                    background: white;
                  " />

                <small *ngIf="doc.get('arquivo')?.touched && doc.get('arquivo')?.errors?.['required']" style="
                    color: red;
                    display: block;
                    margin-top: 5px;
                  ">
                  Arquivo é obrigatório.
                </small>

                <!-- ARQUIVO ATUAL -->
                <small *ngIf="doc.get('nomeArquivo')?.value" style="
                    display: block;
                    margin-top: 10px;
                    color: #666;
                  ">

                  Arquivo atual:

                  <button type="button"
                    (click)="openDocumento(funcionario?.funcionarioId || '', doc.get('documentoId')?.value)" style="
                      background: none;
                      border: none;
                      color: #007bff;
                      cursor: pointer;
                      font-weight: 600;
                      text-decoration: underline;
                      padding-left: 5px;
                    ">
                    {{ doc.get('nomeArquivo')?.value }}
                  </button>

                </small>

              </div>

            </div>

            <!-- REMOVER -->
            <div style="
                display: flex;
                justify-content: flex-end;
                margin-top: 20px;
              ">

              <p-button type="button" [raised]="true" severity="danger" label="Remover" icon="pi pi-trash"
                (click)="removeDocumento(i)">
              </p-button>

            </div>

          </div>

        </div>

      </div>

      <!-- ACTIONS -->
      <div *ngIf="editMode" style="
          display: flex;
          justify-content: flex-end;
          gap: 15px;
          margin-top: 40px;
          flex-wrap: wrap;
        ">

        <p-button label="Salvar" type="submit" [raised]="true" severity="success" icon="pi pi-check"
          [disabled]="!funcionarioForm.valid">
        </p-button>

        <p-button label="Excluir" [raised]="true" severity="danger" icon="pi pi-trash" (click)="deleteFuncionario()">
        </p-button>

        <p-button label="Voltar" [raised]="true" severity="secondary" icon="pi pi-arrow-left" (click)="goBack()">
        </p-button>

      </div>

    </form>

  </div>

</div>
